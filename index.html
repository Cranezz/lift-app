    {name:"Chicken Caesar Salad",type:"Lunch",emoji:"🥗",desc:"Actually filling when you use enough protein. Don't skimp on the chicken.",
     ingredients:[{item:"Grilled chicken breast",l:"220g",g:"180g"},{item:"Romaine lettuce",l:"big bowl ~150g",g:"big bowl ~150g"},{item:"Caesar dressing light",l:"40ml",g:"25ml"},{item:"Parmesan",l:"25g",g:"15g"},{item:"Whole grain croutons",l:"40g",g:"20g"}],
     note:"Prep the chicken ahead. This comes together in 5 minutes.",pin:"grilled+chicken+caesar+salad+healthy+recipe",cal:{l:640,g:430},pro:{l:51,g:44}},
    {name:"Homemade Burgers",type:"Dinner",emoji:"🍔",desc:"Saturday dinner. Make it a good one. These are real burgers not diet food.",
     ingredients:[{item:"Ground beef 80/20",l:"250g patty",g:"180g patty"},{item:"Whole grain bun",l:"1 bun",g:"1 bun or lettuce wrap"},{item:"Cheese slice",l:"1 slice 25g",g:"1 slice 25g"},{item:"Tomato lettuce onion pickles",l:"stack it",g:"stack it"},{item:"Ketchup + mustard",l:"to taste",g:"to taste, skip mayo"},{item:"Sweet potato fries",l:"200g",g:"100g"}],
     note:"GF can do lettuce wrap bun to save ~150 cal. Sweet potato fries in air fryer.",pin:"homemade+beef+burger+sweet+potato+fries+recipe",cal:{l:870,g:580},pro:{l:50,g:40}},

const S = {
  bg:"#070d18",card:"#0f1a2e",card2:"#162030",
  border:"rgba(255,255,255,0.07)",txt:"#e8f0ff",muted:"#4d6080",
  lClr:"#4da6ff",gClr:"#ff6eb4",green:"#22c55e"
};
const btn = (extra={}) => ({border:"none",cursor:"pointer",fontFamily:"inherit",...extra});


function App() {
  const today = new Date().getDay();

  // ── Week key: anchored to Sunday so each calendar week gets a unique key ──
  const getWeekKey = () => {
    const now = new Date();
    const sun = new Date(now);
    sun.setDate(now.getDate() - now.getDay());
    return `${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,'0')}-${String(sun.getDate()).padStart(2,'0')}`;
  };
  const weekKey = getWeekKey();

  const [tab,setTab]       = useState("workouts");
  const [scr,setScr]       = useState("home");
  const [vDay,setVDay]     = useState(today);
  const [vEx,setVEx]       = useState({wk:null,i:0});
  const [wts,setWts]       = useState(DW);
  const [bw,setBw]         = useState({l:155,g:185});
  const [nms,setNms]       = useState({l:"Logan",g:"Partner"});
  const [weekChk,setWC]    = useState({}); // {dayNum: {exId: {pk: [bool,...]}}}
  const [loading,setLoad]  = useState(true);
  const [statsOpen,setSO]  = useState(false);
  const [wtMod,setWM]      = useState(null);
  const [editS,setES]      = useState(null);
  const [demoOpen,setDO]   = useState(false);
  const [mealDay,setMD]    = useState(today);
  const [openMeal,setOM]   = useState(null);
  const [bwHist,setBWH]    = useState({l:[],g:[]});
  const [fbPopup,setFB]    = useState(null);  // null | {wk,day,answers:{l:{feel,sets,reps},g:{feel,sets,reps}},step}
  const [fbGiven,setFBG]   = useState({});    // {weekKey_day: true}
  const [poData,setPO]     = useState({});    // {exId_pk: {pendingWt, pendingSets, pendingReps, nextDate, history:[{date,wt}]}}
  const [allWeeks,setAW]   = useState({});    // {weekKey: {dayNum: {exId: {pk: [bool,...]}}}}
  const [openEx,setOpenEx]   = useState(null);
  const [restTimer,setRT]    = useState({l:null,g:null});  // {l:{secs,total}|null, g:{secs,total}|null}
  const [prs,setPRs]         = useState({});    // {exId_pk: maxWt}
  const [weighInDone,setWID] = useState(false); // true if logged today
  const [weighInOpen,setWIO] = useState(false);
  const [weighInVals,setWIV] = useState({l:"",g:""});

  useEffect(()=>{
    (async()=>{
      if(window.storage){
        try{const r=await window.storage.get("lft-wts");if(r)setWts(p=>({...DW,...JSON.parse(r.value)}));}catch(e){}
        try{const r=await window.storage.get("lft-meta");if(r){const m=JSON.parse(r.value);if(m.bw)setBw(m.bw);if(m.nms)setNms(m.nms);}}catch(e){}
        try{const r=await window.storage.get("lft-chk-"+weekKey);if(r)setWC(JSON.parse(r.value));}catch(e){}
        try{const r=await window.storage.get("lft-bwhist");if(r)setBWH(JSON.parse(r.value));}catch(e){}
        try{const r=await window.storage.get("lft-fbgiven");if(r)setFBG(JSON.parse(r.value));}catch(e){}
        try{const r=await window.storage.get("lft-po");if(r)setPO(JSON.parse(r.value));}catch(e){}
        try{const r=await window.storage.get("lft-prs");if(r)setPRs(JSON.parse(r.value));}catch(e){}
        // Check if weighed in today
        const todayStr=new Date().toISOString().slice(0,10);
        try{const r=await window.storage.get("lft-weighdate");if(r&&r.value===todayStr)setWID(true);}catch(e){}
        // Load all historical week keys for heatmap
        try{
          const awR=await window.storage.get("lft-allweeks");
          if(awR){ setAW(JSON.parse(awR.value)); }
        }catch(e){}
      }
      // Seed body weight history if empty
      const todaySeed=new Date().toISOString().slice(0,10);
      setBWH(prev=>{
        if(prev.l.length===0&&prev.g.length===0){
          const seeded={l:[{date:todaySeed,v:155}],g:[{date:todaySeed,v:185}]};
          if(window.storage)window.storage.set("lft-bwhist",JSON.stringify(seeded));
          return seeded;
        }
        return prev;
      });
      // Seed lift history from DW if poData has no history
      setPO(prev=>{
        const npo={...prev};
        let changed=false;
        Object.keys(DW).forEach(id=>{
          ["l","g"].forEach(pk=>{
            const key=id+"_"+pk;
            if(!npo[key]?.history?.length){
              npo[key]={...(npo[key]||{}),history:[{date:todaySeed,wt:DW[id][pk]}],pendingWt:DW[id][pk]};
              changed=true;
            }
          });
        });
        if(changed&&window.storage)window.storage.set("lft-po",JSON.stringify(npo));
        return changed?npo:prev;
      });
      setLoad(false);
    })();
  },[]);

  const saveWts  = async w=>{if(window.storage)try{await window.storage.set("lft-wts",JSON.stringify(w));}catch(e){}};
  const saveMeta = async(b,n)=>{if(window.storage)try{await window.storage.set("lft-meta",JSON.stringify({bw:b,nms:n}));}catch(e){}};
  const saveBWH  = async h=>{if(window.storage)try{await window.storage.set("lft-bwhist",JSON.stringify(h));}catch(e){}};
  const saveFBG  = async d=>{if(window.storage)try{await window.storage.set("lft-fbgiven",JSON.stringify(d));}catch(e){}};
  const savePO   = async d=>{if(window.storage)try{await window.storage.set("lft-po",JSON.stringify(d));}catch(e){}};
  const saveAW   = async d=>{if(window.storage)try{await window.storage.set("lft-allweeks",JSON.stringify(d));}catch(e){}};
  const savePRs  = async d=>{if(window.storage)try{await window.storage.set("lft-prs",JSON.stringify(d));}catch(e){}};
  const saveChk  = async wc=>{
    if(window.storage)try{await window.storage.set("lft-chk-"+weekKey,JSON.stringify(wc));}catch(e){}
    // Mirror into allWeeks for heatmap
    setAW(prev=>{
      const naw={...prev,[weekKey]:wc};
      saveAW(naw);
      return naw;
    });
  };

  const tog = (id,pk,si)=>{
    // Read BEFORE toggling so we know if this is a check or uncheck
    setWC(prev=>{
      const day=prev[vDay]||{}, ex=day[id]||{}, arr=[...(ex[pk]||[])];
      const wasUnchecked = !arr[si];  // true = user is checking it ON
      arr[si]=!arr[si];
      const nw={...prev,[vDay]:{...day,[id]:{...ex,[pk]:arr}}};
      saveChk(nw);
      // Start rest timer only when checking a set ON
      if(wasUnchecked){
        const secs=pk==="l"?90:60;
        setRT(p=>({...p,[pk]:{secs,total:secs}}));
      }
      return nw;
    });
  };
  const chkAll = (id,pk,n,v)=>setWC(prev=>{
    const day=prev[vDay]||{}, ex=day[id]||{};
    const nw={...prev,[vDay]:{...day,[id]:{...ex,[pk]:Array(n).fill(v)}}};
    saveChk(nw); return nw;
  });

  // Current workout day helpers
  const gc       = (id,pk)=>weekChk[vDay]?.[id]?.[pk]||[];
  const gdn      = (id,pk)=>gc(id,pk).filter(Boolean).length;
  // Any day helpers (for home screen)
  const gcDay    = (day,id,pk)=>weekChk[day]?.[id]?.[pk]||[];
  const gdnDay   = (day,id,pk)=>gcDay(day,id,pk).filter(Boolean).length;

  const gAll     = wk=>!wk?0:WO[wk].exercises.reduce((a,e)=>a+e.l.s+e.g.s,0);
  const gTot     = wk=>!wk?0:WO[wk].exercises.reduce((a,e)=>a+gdn(e.id,"l")+gdn(e.id,"g"),0);
  const gTotDay  = (wk,day)=>!wk?0:WO[wk].exercises.reduce((a,e)=>a+gdnDay(day,e.id,"l")+gdnDay(day,e.id,"g"),0);

  // Open weigh-in popup on load if not done today
  useEffect(()=>{
    if(!loading&&!weighInDone) setWIO(true);
  },[loading]);

  // Trigger feedback popup when a workout day is fully completed
  useEffect(()=>{
    if(scr!=="exercise"&&scr!=="workout") return;
    const wk=SCHED[vDay]; if(!wk) return;
    const tot=gAll(wk), dn=gTotDay(wk,vDay);
    const fbKey=weekKey+"_"+vDay;
    if(tot>0 && dn===tot && !fbGiven[fbKey]){
      setFB({wk,day:vDay,answers:{l:{feel:null,sets:null,reps:null},g:{feel:null,sets:null,reps:null}},step:0});
    }
  },[weekChk]);

  // Apply PO adjustments from poData to wts
  const getEffectiveWt = (id,pk) => {
    const key=id+"_"+pk;
    return poData[key]?.pendingWt ?? wts[id]?.[pk] ?? 0;
  };

  // Compute PO recommendation after feedback
  const applyFeedback = (wk, answers) => {
    const today = new Date().toISOString().slice(0,10);
    const newPO = {...poData};
    WO[wk].exercises.forEach(ex => {
      ["l","g"].forEach(pk => {
        const key = ex.id+"_"+pk;
        const ans = answers[pk];
        const curWt = wts[ex.id]?.[pk] || 0;
        const hist = newPO[key]?.history || [];
        let newWt = curWt, newSets = null, newReps = null, nextDate = null;
        const twoWeeks = new Date(); twoWeeks.setDate(twoWeeks.getDate()+14);
        const oneWeek  = new Date(); oneWeek.setDate(oneWeek.getDate()+7);
        if(pk==="l"){
          // Logan: muscle/weight gain — weight-focused
          if(ans.feel==="light" && ans.reps==="easy"){
            newWt = curWt + 5;
            nextDate = today;
          } else if(ans.feel==="right" && ans.reps!=="hard"){
            newWt = curWt + 5;
            nextDate = twoWeeks.toISOString().slice(0,10);
          } else if(ans.feel==="heavy" || ans.reps==="hard"){
            newWt = curWt; // hold
            nextDate = twoWeeks.toISOString().slice(0,10);
          }
          // sets feedback: Logan keeps sets (volume = muscle)
        } else {
          // GF: weight loss — rep-focused, adjust sets smartly
          if(ans.feel==="light" && ans.reps==="easy"){
            newWt = curWt + 2.5;
            nextDate = today;
          } else if(ans.feel==="right" && ans.reps!=="hard"){
            newReps = (ex.g.r || 12) + 1;
            nextDate = twoWeeks.toISOString().slice(0,10);
          } else if(ans.feel==="heavy" || ans.reps==="hard"){
            newWt = Math.max(curWt - 5, 5);
            nextDate = today;
          }
          if(ans.sets==="toomany"){
            // Drop 1 set, add 2 reps — keeps calorie burn, reduces fatigue
            newSets = Math.max((ex.g.s || 3) - 1, 2);
            newReps = (ex.g.r || 12) + 2;
            nextDate = today;
          } else if(ans.sets==="toofew"){
            newSets = (ex.g.s || 3) + 1;
            nextDate = today;
          }
        }
        const updatedHist = newWt !== curWt ? [...hist, {date:today, wt:newWt}].slice(-50) : hist;
        newPO[key] = {
          pendingWt: newWt !== curWt ? newWt : (newPO[key]?.pendingWt ?? curWt),
          pendingSets: newSets,
          pendingReps: newReps,
          nextDate,
          history: updatedHist
        };
      });
    });
    setPO(newPO); savePO(newPO);
    // If weight changed immediately, update wts too
    const newWts = {...wts};
    WO[wk].exercises.forEach(ex => {
      ["l","g"].forEach(pk => {
        const key=ex.id+"_"+pk;
        const po=newPO[key];
        if(po?.nextDate===today && po.pendingWt && po.pendingWt!==wts[ex.id]?.[pk]){
          newWts[ex.id] = {...(newWts[ex.id]||{}), [pk]: po.pendingWt};
        }
      });
    });
    setWts(newWts); saveWts(newWts);
    // Update PRs
    setPRs(prevPRs=>{
      const np={...prevPRs};
      WO[wk].exercises.forEach(ex=>{
        ["l","g"].forEach(pk=>{
          const key=ex.id+"_"+pk;
          const nw=newWts[ex.id]?.[pk];
          if(nw&&(!np[key]||nw>np[key])) np[key]=nw;
        });
      });
      savePRs(np); return np;
    });
  };


  // ── REST TIMER COUNTDOWN ─────────────────────────────────────────────────
  useEffect(()=>{
    if(!restTimer.l||restTimer.l.secs<=0) return;
    const id=setTimeout(()=>setRT(p=>({...p,l:p.l?{...p.l,secs:p.l.secs-1}:null})),1000);
    return()=>clearTimeout(id);
  },[restTimer.l]);
  useEffect(()=>{
    if(!restTimer.g||restTimer.g.secs<=0) return;
    const id=setTimeout(()=>setRT(p=>({...p,g:p.g?{...p.g,secs:p.g.secs-1}:null})),1000);
    return()=>clearTimeout(id);
  },[restTimer.g]);

  // ── PULL TO REFRESH ──────────────────────────────────────────────────────
  useEffect(()=>{
    let startY=0, pulled=false;
    const onStart = e => { startY=e.touches[0].clientY; pulled=false; };
    const onMove  = e => {
      if(window.scrollY===0 && e.touches[0].clientY - startY > 80){ pulled=true; }
    };
    const onEnd   = () => { if(pulled){ pulled=false; window.location.reload(); } };
    document.addEventListener("touchstart",onStart,{passive:true});
    document.addEventListener("touchmove",onMove,{passive:true});
    document.addEventListener("touchend",onEnd);
    return()=>{
      document.removeEventListener("touchstart",onStart);
      document.removeEventListener("touchmove",onMove);
      document.removeEventListener("touchend",onEnd);
    };
  },[]);


  // ── REST TIMER OVERLAY ────────────────────────────────────────────────────
  const RestTimerBar = () => {
    const timers = [
      restTimer.l ? {pk:"l", clr:S.lClr, ...restTimer.l} : null,
      restTimer.g ? {pk:"g", clr:S.gClr, ...restTimer.g} : null,
    ].filter(Boolean);
    if(!timers.length) return null;

    return(
      <div style={{position:"fixed",bottom:80,left:12,right:12,zIndex:90,display:"flex",flexDirection:"column",gap:8}}>
        {timers.map(({pk,clr,secs,total})=>{
          const pct=secs/total, done=secs<=0;
          return(
            <div key={pk} style={{background:S.card,borderRadius:18,padding:"12px 16px",border:`1px solid ${clr}55`,boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16}}>{done?"✅":"⏱️"}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:clr}}>{pk==="l"?nms.l:nms.g} — Rest</div>
                    <div style={{fontSize:11,color:S.muted}}>{done?"Done — start next set!":"Next set in..."}</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:24,fontWeight:900,color:done?S.green:S.txt,fontVariantNumeric:"tabular-nums"}}>
                    {done?"Go!":`${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`}
                  </div>
                  <button
                    onClick={()=>setRT(p=>({...p,[pk]:null}))}
                    style={btn({background:"rgba(255,255,255,0.06)",color:S.muted,padding:"6px 12px",borderRadius:10,fontSize:12,fontWeight:700})}
                  >Skip</button>
                </div>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",background:done?S.green:clr,borderRadius:99,width:`${pct*100}%`,transition:"width 1s linear"}}/>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  // ── DAILY WEIGH-IN POPUP ──────────────────────────────────────────────────
  const WeighInPopup = () => {
    if(weighInDone||!weighInOpen) return null;
    const bothFilled = weighInVals.l&&weighInVals.g;
    const now = new Date().getHours();
    const tip = now<10
      ? "Perfect time to weigh in — morning, after bathroom, before eating or drinking."
      : now<14
      ? "Best to weigh yourself tomorrow morning — same time, before eating, for consistency."
      : "For best accuracy, weigh yourself tomorrow morning right after waking up.";

    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:110,display:"flex",alignItems:"flex-end"}}>
        <div style={{background:S.card,width:"100%",borderRadius:"24px 24px 0 0",padding:"28px 20px 36px",border:`1px solid ${S.border}`}}>
          <div style={{textAlign:"center",marginBottom:4}}>
            <div style={{fontSize:24}}>⚖️</div>
            <div style={{fontSize:19,fontWeight:800,marginTop:6}}>Daily Weigh-In</div>
          </div>
          <div style={{background:"rgba(77,166,255,0.08)",border:"1px solid rgba(77,166,255,0.15)",borderRadius:12,padding:"10px 14px",margin:"14px 0",fontSize:13,color:"#7ab8ff",lineHeight:1.6,textAlign:"center"}}>
            💡 {tip}
          </div>
          {[{pk:"l",c:S.lClr},{pk:"g",c:S.gClr}].map(({pk,c})=>(
            <div key={pk} style={{marginBottom:12}}>
              <div style={{fontSize:11,color:c,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{nms[pk]}</div>
              <input
                type="number"
                placeholder={`Current weight (lbs)`}
                value={weighInVals[pk]}
                onChange={e=>setWIV(p=>({...p,[pk]:e.target.value}))}

  // ── FEEDBACK POPUP ────────────────────────────────────────────────────────
  const FeedbackPopup = () => {

              {pk==="l" ? (
                answers.l.feel==="light"&&answers.l.reps==="easy" ? "🔥 Nice — going up 5 lbs on all exercises next session" :

                "✅ On track — weight increase scheduled in 2 weeks"

                answers.g.feel==="light"&&answers.g.reps==="easy" ? "📈 Adding 2.5 lbs — progress without overloading the deficit" :
                "✅ On track — adding a rep per set in 2 weeks"

            </div>
          )}
        </div>
      );
    };

    const bothDone = answers.l.feel&&answers.l.sets&&answers.l.reps&&answers.g.feel&&answers.g.sets&&answers.g.reps;

    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:100,display:"flex",alignItems:"flex-end",overflowY:"auto"}}>
        <div style={{background:S.card,width:"100%",borderRadius:"24px 24px 0 0",padding:"24px 20px 36px",border:`1px solid ${S.border}`,maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{textAlign:"center",marginBottom:4}}>
            <div style={{fontSize:22}}>🏁</div>
            <div style={{fontSize:19,fontWeight:800,marginTop:4}}>Workout Complete!</div>
            <div style={{fontSize:13,color:S.muted,marginTop:4}}>{WO[wk].name} · How did it go?</div>
          </div>
          <div style={{height:1,background:S.border,margin:"16px 0"}}/>

          <PersonSection pk="l" clr={S.lClr}/>
          <PersonSection pk="g" clr={S.gClr}/>

          <div style={{display:"flex",gap:12,marginTop:4}}>

              onClick={()=>{

  if(loading)return(<div style={{background:S.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:S.lClr,fontSize:28}}>💪</div></div>);

  const BottomNav=()=>(

  // ── PROGRESS ──────────────────────────────────────────────────────────────
  if(tab==="progress"){
    // Simple SVG line graph helper
    const LineGraph = ({data, colors, labels, unit=""}) => {
      const W=340, H=160, PAD={t:16,r:16,b:32,l:40};
      const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
      if(!data.length||!data[0].length) return(
        <div style={{height:H,display:"flex",alignItems:"center",justifyContent:"center",color:S.muted,fontSize:13}}>No data yet — update your weight in Stats to start tracking</div>
      );
      const allPts = data.flat();
      const vals = allPts.map(p=>p.v);
      const minV=Math.min(...vals)-2, maxV=Math.max(...vals)+2;
      const dates = [...new Set(allPts.map(p=>p.date))].sort();
      const xScale = i => PAD.l + (i/(Math.max(dates.length-1,1)))*iW;
      const yScale = v => PAD.t + iH - ((v-minV)/(maxV-minV||1))*iH;
      const pathFor = pts => {
        const sorted = [...pts].sort((a,b)=>a.date.localeCompare(b.date));
        return sorted.map((p,i)=>{
          const x=xScale(dates.indexOf(p.date)), y=yScale(p.v);
          return i===0?`M${x},${y}`:`L${x},${y}`;
        }).join(" ");
      };
      // x-axis labels: show first, middle, last
      const xLabels = dates.length<=1?dates:
        dates.length===2?dates:
        [dates[0], dates[Math.floor((dates.length-1)/2)], dates[dates.length-1]];
      return(
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
          {/* Grid lines */}
          {[0,0.25,0.5,0.75,1].map((t,i)=>{
            const y=PAD.t+iH*t;
            const v=Math.round(maxV-(maxV-minV)*t);
            return(<g key={i}>
              <line x1={PAD.l} y1={y} x2={PAD.l+iW} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
              <text x={PAD.l-6} y={y+4} textAnchor="end" fill="#4d6080" fontSize="10">{v}</text>
            </g>);
          })}
          {/* X labels */}
          {xLabels.map((d,i)=>{
            const xi = dates.indexOf(d);
            return(<text key={i} x={xScale(xi)} y={H-4} textAnchor="middle" fill="#4d6080" fontSize="9">{d.slice(5)}</text>);
          })}
          {/* Lines */}
          {data.map((pts,di)=>pts.length>0&&(
            <g key={di}>
              <path d={pathFor(pts)} fill="none" stroke={colors[di]} strokeWidth="2" strokeLinejoin="round"/>
              {pts.map((p,pi)=>(
                <circle key={pi} cx={xScale(dates.indexOf(p.date))} cy={yScale(p.v)} r="3" fill={colors[di]}/>
              ))}
            </g>
          ))}
          {/* Legend */}
          {labels.map((lb,i)=>(
            <g key={i} transform={`translate(${PAD.l+i*100},${H-4})`}>
              <line x1="0" y1="-8" x2="12" y2="-8" stroke={colors[i]} strokeWidth="2"/>
              <text x="16" y="-4" fill={colors[i]} fontSize="9" fontWeight="700">{lb}</text>
            </g>
          ))}
        </svg>
      );
    };

    return(
      <div style={{background:S.bg,minHeight:"100vh",color:S.txt,fontFamily:"'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif",paddingBottom:80}}>
        <div style={{background:S.card,borderBottom:`1px solid ${S.border}`,padding:"36px 20px 18px",position:"sticky",top:0,zIndex:10}}>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>📈 Progress</div>
          <div style={{fontSize:12,color:S.muted,marginTop:3}}>Track your gains over time</div>
        </div>

        <div style={{padding:"16px 16px 0",display:"flex",flexDirection:"column",gap:16}}>

          {/* Body Weight Card */}
          <div style={{background:S.card,borderRadius:20,padding:18,border:`1px solid ${S.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontSize:16,fontWeight:800}}>⚖️ Body Weight</div>
              <div style={{fontSize:11,color:S.muted}}>lbs · last 90 days</div>
            </div>
            <div style={{display:"flex",gap:16,marginBottom:14}}>
              {[{pk:"l",c:S.lClr},{pk:"g",c:S.gClr}].map(({pk,c})=>{
                const hist = bwHist[pk]||[];
                const latest = hist.length?hist[hist.length-1].v:bw[pk];
                const prev = hist.length>1?hist[hist.length-2].v:null;
                const diff = prev?+(latest-prev).toFixed(1):null;
                return(
                  <div key={pk} style={{flex:1,background:S.card2,borderRadius:12,padding:"10px 12px",border:`1px solid ${c}22`}}>
                    <div style={{fontSize:11,color:c,fontWeight:700,marginBottom:2}}>{nms[pk]}</div>
                    <div style={{fontSize:20,fontWeight:900,color:S.txt}}>{latest} <span style={{fontSize:11,color:S.muted}}>lbs</span></div>
                    {diff!==null&&<div style={{fontSize:11,color:diff>0?"#fb923c":diff<0?S.green:S.muted,marginTop:2}}>{diff>0?"+":""}{diff} since last update</div>}
                  </div>
                );
              })}
            </div>
            <LineGraph
              data={[bwHist.l||[], bwHist.g||[]]}
              colors={[S.lClr, S.gClr]}
              labels={[nms.l, nms.g]}
              unit="lbs"
            />
            <div style={{fontSize:11,color:S.muted,textAlign:"center",marginTop:8}}>Update weight in ⚙ Stats to log a new entry</div>
          </div>

          {/* Workout Heatmap — days=rows, weeks=cols, full year */}
          {(()=>{
            const YEAR = new Date().getFullYear();
            const todayDate = new Date(); todayDate.setHours(0,0,0,0);

            // Find Sunday on or before Jan 1 of this year
            const jan1 = new Date(YEAR, 0, 1);
            const startSun = new Date(jan1);
            startSun.setDate(jan1.getDate() - jan1.getDay());

            // Build 53 weeks x 7 days grid
            const NUM_WEEKS = 53;
            const weeks = [];
            for(let w=0; w<NUM_WEEKS; w++){
              const week=[];
              for(let d=0; d<7; d++){
                const date=new Date(startSun);
                date.setDate(startSun.getDate()+w*7+d);
                const dayNum=date.getDay();
                const isFuture=date>todayDate;
                const isOtherYear=date.getFullYear()!==YEAR;
                const sun=new Date(date); sun.setDate(date.getDate()-date.getDay());
                const wk=`${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,'0')}-${String(sun.getDate()).padStart(2,'0')}`;
                const wkData=allWeeks[wk]||{};
                const woKey=SCHED[dayNum];
                let pct=0;
                if(woKey&&!isFuture&&!isOtherYear){
                  const dd=wkData[dayNum]||{};
                  const tot=WO[woKey].exercises.reduce((a,e)=>a+e.l.s+e.g.s,0);
                  const dn=WO[woKey].exercises.reduce((a,e)=>{
                    const l=dd[e.id]?.l||[], g=dd[e.id]?.g||[];
                    return a+l.filter(Boolean).length+g.filter(Boolean).length;
                  },0);
                  pct=tot>0?dn/tot:0;
                }
                week.push({date,dayNum,woKey,isFuture,isOtherYear,pct,isToday:date.toDateString()===todayDate.toDateString()});
              }
              weeks.push(week);
            }

            const cellClr=(cell)=>{
              if(cell.isOtherYear||cell.isFuture||!cell.woKey) return "rgba(255,255,255,0.03)";
              if(cell.pct===0) return "rgba(255,255,255,0.07)";
              if(cell.pct<0.34) return "#14532d";
              if(cell.pct<0.67) return "#16a34a";
              if(cell.pct<1)    return "#22c55e";
              return "#4ade80";
            };

            // Month label at column where each month first appears
            const monthAtCol=[];
            const seenMonths=new Set();
            weeks.forEach((week,wi)=>{
              const first=week.find(c=>!c.isOtherYear);
              if(first){
                const mo=first.date.getMonth();
                if(!seenMonths.has(mo)){
                  seenMonths.add(mo);
                  monthAtCol.push({wi,name:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][mo]});
                }
              }
            });

            // Week number label every 4 cols
            const weekLabel=(wi)=>{
              if(wi%4!==0) return "";
              const n=wi+1; return n<=52?String(n):"";
            };

            const DAY_LABELS=["S","M","T","W","Th","F","S"];

            // Streak
            let streak=0;
            const td2=new Date(); td2.setHours(0,0,0,0);
            for(let i=0;i<90;i++){
              const d=new Date(td2); d.setDate(td2.getDate()-i);
              const dn=d.getDay(); const woK=SCHED[dn];
              if(!woK) continue;
              const sun=new Date(d); sun.setDate(d.getDate()-d.getDay());
              const wkk=`${sun.getFullYear()}-${String(sun.getMonth()+1).padStart(2,'0')}-${String(sun.getDate()).padStart(2,'0')}`;
              const dd=allWeeks[wkk]?.[dn]||{};
              const tot=WO[woK].exercises.reduce((a,e)=>a+e.l.s+e.g.s,0);
              const dn2=WO[woK].exercises.reduce((a,e)=>{const l=dd[e.id]?.l||[],g=dd[e.id]?.g||[];return a+l.filter(Boolean).length+g.filter(Boolean).length;},0);
              if(tot>0&&dn2===tot){streak++;}else if(tot>0){break;}
            }

            const CELL=11, GAP=2, STEP=CELL+GAP, LEFT_W=22;

            return(
              <div style={{background:S.card,borderRadius:20,padding:18,border:`1px solid ${S.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:16,fontWeight:800}}>🗓️ {YEAR} Heatmap</div>
                  {streak>0&&<div style={{fontSize:12,color:"#4ade80",fontWeight:700}}>🔥 {streak} streak</div>}
                </div>

                <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
                  <div style={{display:"inline-block"}}>

                    {/* Month names row */}
                    <div style={{display:"flex",marginLeft:LEFT_W,marginBottom:1}}>
                      {weeks.map((_,wi)=>{
                        const ml=monthAtCol.find(m=>m.wi===wi);
                        return(
                          <div key={wi} style={{width:STEP,flexShrink:0,fontSize:8,color:"#6b8aaa",fontWeight:700,overflow:"hidden",whiteSpace:"nowrap"}}>
                            {ml?ml.name:""}
                          </div>
                        );
                      })}
                    </div>

                    {/* Week numbers row */}
                    <div style={{display:"flex",marginLeft:LEFT_W,marginBottom:4}}>
                      {weeks.map((_,wi)=>(
                        <div key={wi} style={{width:STEP,flexShrink:0,fontSize:7,color:S.muted,overflow:"hidden"}}>
                          {weekLabel(wi)}
                        </div>
                      ))}
                    </div>

                    {/* Day rows — S M T W Th F S */}
                    {[0,1,2,3,4,5,6].map(dayIdx=>(
                      <div key={dayIdx} style={{display:"flex",alignItems:"center",marginBottom:GAP}}>
                        <div style={{width:LEFT_W,flexShrink:0,fontSize:8,color:S.muted,textAlign:"right",paddingRight:4,fontWeight:700}}>
                          {DAY_LABELS[dayIdx]}
                        </div>
                        {weeks.map((week,wi)=>{
                          const cell=week[dayIdx];
                          return(
                            <div key={wi} style={{
                              width:CELL,height:CELL,borderRadius:2,
                              flexShrink:0,marginRight:GAP,
                              background:cellClr(cell),
                              border:cell.isToday?"1.5px solid #4da6ff":"1px solid transparent",
                              boxSizing:"border-box"
                            }}/>
                          );
                        })}
                      </div>
                    ))}

                  </div>
                </div>

                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:10,justifyContent:"flex-end"}}>
                  <span style={{fontSize:9,color:S.muted}}>Less</span>
                  {["rgba(255,255,255,0.07)","#14532d","#16a34a","#22c55e","#4ade80"].map((c,i)=>(
                    <div key={i} style={{width:10,height:10,borderRadius:2,background:c}}/>
                  ))}
                  <span style={{fontSize:9,color:S.muted}}>More</span>
                </div>
              </div>
            );
          })()}

          {/* Lift Progress Section */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{fontSize:16,fontWeight:800,paddingTop:4}}>🏋️ Lift Progress</div>
                {MUSCLE_GROUPS.map((mg,mgi)=>(
                  <div key={mgi} style={{background:S.card,borderRadius:20,overflow:"hidden",border:`1px solid ${S.border}`}}>
                    <div style={{padding:"14px 18px 10px",display:"flex",alignItems:"center",gap:8,borderBottom:`1px solid ${S.border}`}}>
                      <span style={{fontSize:18}}>{mg.icon}</span>
                      <span style={{fontSize:13,fontWeight:800,color:"#a0b8d8",letterSpacing:"0.03em"}}>{mg.name}</span>
                    </div>
                    {mg.ids.map((id,ei)=>{
                      const ex = EX_MAP[id]; if(!ex) return null;
                      const lWt = wts[id]?.l||0, gWt = wts[id]?.g||0;
                      const lKey=id+"_l", gKey=id+"_g";
                      const lPO=poData[lKey], gPO=poData[gKey];
                      const lHist=lPO?.history||[], gHist=gPO?.history||[];
                      const lNext=lPO?.nextDate, gNext=gPO?.nextDate;
                      const today=new Date().toISOString().slice(0,10);
                      const daysUntil = d=>{if(!d)return null;const diff=Math.ceil((new Date(d)-new Date())/86400000);return diff<=0?"Today":diff===1?"Tomorrow":`In ${diff} days`;};
                      const isOpen = openEx===id;
                      const allHist = [...lHist.map(h=>({...h,pk:"l"})),...gHist.map(h=>({...h,pk:"g"}))];
                      const hasHistory = lHist.length>0||gHist.length>0;

              <div style={{fontSize:11,fontWeight:700,textAlign:"center",color:"#a0b8d8",lineHeight:1.3}}>{ex.short}</div>
              <div style={{fontSize:16,fontWeight:800,color:clr,marginTop:10}}>
                {wt} lbs {isPR&&<span style={{fontSize:12}}>🏆</span>}
              </div>
              <button onClick={()=>setWM({id:ex.id,pk,val:String(wt)})} style={btn({fontSize:11,color:S.muted,marginTop:5,background:"none",padding:"2px 0"})}>✏️ edit</button>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <button onClick={()=>chkAll(ex.id,pk,s,!allD)} style={btn({display:"flex",alignItems:"center",gap:9,marginBottom:10,width:"100%",padding:0,background:"none"})}>
                <div style={{width:22,height:22,borderRadius:7,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:allD?clr:someD?`${clr}22`:"transparent",border:`2px solid ${allD||someD?clr:S.muted}`,transition:"all 0.2s"}}>
                  {allD&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}
                  {someD&&<span style={{color:clr,fontSize:13,fontWeight:900,lineHeight:1}}>–</span>}
                </div>
                <span style={{fontSize:12,color:S.muted,fontWeight:700}}>All {s} sets</span>
                {(po.pendingSets||po.pendingReps)&&<span style={{fontSize:10,color:"#fbbf24",marginLeft:4}}>adjusted</span>}
              </button>
              {Array.from({length:s}).map((_,si)=>{
                const done=arr[si]||false;
                return(
                  <button key={si} onClick={()=>tog(ex.id,pk,si)} style={btn({display:"flex",alignItems:"center",gap:10,width:"100%",background:done?`${clr}18`:S.card2,border:`1px solid ${done?clr+"44":S.border}`,borderRadius:13,padding:"9px 12px",marginBottom:7,color:S.txt,transition:"all 0.15s"})}>
                    <div style={{width:22,height:22,borderRadius:7,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:done?clr:"transparent",border:`2px solid ${done?clr:S.muted}`,transition:"all 0.15s"}}>
                      {done&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}
                    </div>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontSize:12,fontWeight:700,color:done?S.txt:"#7a9abf"}}>Set {si+1}</div>
                      <div style={{fontSize:11,color:S.muted,marginTop:1}}>{r}{note?` ${note}`:""} reps · {wt} lbs</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    return(
      <div style={{background:S.bg,minHeight:"100vh",color:S.txt,fontFamily:"'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif",paddingBottom:100}}>
        <div style={{background:S.card,borderBottom:`1px solid ${S.border}`,padding:"36px 20px 16px",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>{setScr("workout");setWM(null);}} style={btn({color:S.muted,fontSize:26,lineHeight:1,background:"none"})}>‹</button>
            <div style={{fontSize:28}}>{ex.icon}</div>
            <div>
              <div style={{fontSize:20,fontWeight:800,letterSpacing:"-0.3px"}}>{ex.name}</div>
              <div style={{fontSize:12,color:S.muted}}>{W.name} · {DNAME[vDay]}</div>
            </div>
          </div>
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px 4px"}}>
          <button onClick={()=>{setVEx({wk,i:(i-1+W.exercises.length)%W.exercises.length});setDO(false);}} style={btn({background:S.card,color:S.muted,padding:"8px 18px",borderRadius:12,fontSize:13,fontWeight:600,border:`1px solid ${S.border}`})}>&#8249; Prev</button>
          <span style={{fontSize:12,color:S.muted}}>{i+1} / {W.exercises.length}</span>
          <button onClick={()=>{setVEx({wk,i:(i+1)%W.exercises.length});setDO(false);}} style={btn({background:S.card,color:S.muted,padding:"8px 18px",borderRadius:12,fontSize:13,fontWeight:600,border:`1px solid ${S.border}`})}>Next &#8250;</button>
        </div>

        <div style={{padding:"12px 16px 0",display:"flex",flexDirection:"column",gap:14}}>
          {pBox("l",S.lClr,ex.l)}
          {pBox("g",S.gClr,ex.g)}
        </div>

        {dm&&(
          <div style={{padding:"12px 16px 0"}}>
            <button onClick={()=>setDO(p=>!p)} style={btn({width:"100%",background:S.card,borderRadius:18,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${demoOpen?"#4da6ff44":S.border}`,color:S.txt})}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18}}>📺</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#c8daf0"}}>How To Do This</div>
                  <div style={{fontSize:11,color:S.muted,marginTop:1}}>{dm.equip}</div>
                </div>
              </div>
              <span style={{color:S.muted,fontSize:18,display:"block",transform:demoOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>&#8964;</span>
            </button>
            {demoOpen&&(
              <div style={{background:S.card,borderRadius:"0 0 18px 18px",marginTop:-8,padding:"8px 18px 18px",border:"1px solid rgba(77,166,255,0.13)",borderTop:"none"}}>
                <div style={{height:1,background:S.border,marginBottom:14}}/>
                {dm.cues.map((cue,ci)=>(
                  <div key={ci} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
                    <div style={{width:22,height:22,borderRadius:99,background:"#0d2040",border:"1px solid rgba(77,166,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                      <span style={{fontSize:10,fontWeight:800,color:"#4da6ff"}}>{ci+1}</span>
                    </div>
                    <span style={{fontSize:13,color:"#a0b8d8",lineHeight:1.5}}>{cue}</span>
                  </div>
                ))}
                <a href={`https://www.youtube.com/results?search_query=${dm.yt}`} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(255,0,0,0.1)",border:"1px solid rgba(255,0,0,0.2)",borderRadius:12,padding:"11px 16px",marginTop:6,textDecoration:"none"}}>
                  <span style={{fontSize:18}}>&#9654;&#65039;</span>
                  <span style={{color:"#ff6b6b",fontWeight:700,fontSize:13}}>Watch on YouTube</span>
                </a>
              </div>
            )}
          </div>
        )}

        {wtMod&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:50,display:"flex",alignItems:"flex-end"}}>
            <div style={{background:S.card,width:"100%",borderRadius:"24px 24px 0 0",padding:"28px 20px 36px",border:`1px solid ${S.border}`}}>
              <div style={{fontSize:19,fontWeight:800,marginBottom:4}}>{ex.name}</div>
              <div style={{fontSize:13,color:S.muted,marginBottom:18}}>Update working weight for {nms[wtMod.pk]}</div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <button onClick={()=>setWM(p=>({...p,val:String(Math.max(0,parseFloat(p.val||0)-5))}))} style={btn({background:S.card2,color:S.txt,width:44,height:44,borderRadius:12,fontSize:20,fontWeight:700,border:`1px solid ${S.border}`,flexShrink:0})}>&#8722;</button>
                <input type="number" style={{flex:1,background:S.card2,color:S.txt,borderRadius:14,padding:"14px",fontSize:24,textAlign:"center",fontWeight:900,boxSizing:"border-box",border:`1px solid ${S.border}`,outline:"none"}} value={wtMod.val} onChange={e=>setWM(p=>({...p,val:e.target.value}))} autoFocus/>
                <button onClick={()=>setWM(p=>({...p,val:String(parseFloat(p.val||0)+5)}))} style={btn({background:S.card2,color:S.txt,width:44,height:44,borderRadius:12,fontSize:20,fontWeight:700,border:`1px solid ${S.border}`,flexShrink:0})}>+</button>
              </div>
              <div style={{fontSize:12,color:S.muted,textAlign:"center",marginBottom:18}}>lbs · use +5 / -5 for quick adjustments</div>
              <div style={{display:"flex",gap:12}}>
                <button onClick={()=>setWM(null)} style={btn({flex:1,background:S.card2,color:S.muted,padding:15,borderRadius:14,fontWeight:700,fontSize:15,border:`1px solid ${S.border}`})}>Cancel</button>
                <button onClick={()=>{
  const num=parseFloat(wtMod.val);
  if(!isNaN(num)&&num>0){
    const nw={...wts,[wtMod.id]:{...wts[wtMod.id],[wtMod.pk]:num}};
    setWts(nw); saveWts(nw);
    // Check PR
    const prKey=wtMod.id+"_"+wtMod.pk;
    if(!prs[prKey]||num>prs[prKey]){
      const np={...prs,[prKey]:num};
      setPRs(np); savePRs(np);
    }
    // Log to PO history
    const key=wtMod.id+"_"+wtMod.pk;
    const ts=new Date().toISOString().slice(0,10);
    const hist=[...(poData[key]?.history||[]).filter(h=>h.date!==ts),{date:ts,wt:num}].slice(-50);
    const npo={...poData,[key]:{...(poData[key]||{}),history:hist,pendingWt:num}};
    setPO(npo); savePO(npo);
  }
  setWM(null);
}} style={btn({flex:1,background:S.lClr,color:"#fff",padding:15,borderRadius:14,fontWeight:700,fontSize:15})}>Save</button>
              </div>
            </div>
          </div>
        )}
        <RestTimerBar/>
        <WeighInPopup/>
        <FeedbackPopup/>
        <BottomNav/>
      </div>
    );
  }

  return null;
}



    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
